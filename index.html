<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>환율 계산기 PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:15px;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:none;
font-size:16px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
background:#38bdf8;
color:black;
font-weight:bold;
cursor:pointer;
}

#result{
font-size:22px;
margin-top:10px;
}

.rate{
font-size:14px;
opacity:0.8;
}

.history{
text-align:left;
margin-top:20px;
font-size:14px;
}

canvas{
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>💱 환율 계산기 PRO</h2>

<input id="search" placeholder="통화 검색 (USD, KRW, JPY...)">

<input id="amount" type="number" placeholder="금액 입력">

<select id="from"></select>

<button onclick="swap()">🔄 통화 전환</button>

<select id="to"></select>

<div>

<button onclick="convert()">계산</button>

<button onclick="loadRates()">환율 새로고침</button>

</div>

<div id="result"></div>

<div class="rate" id="rateInfo"></div>

<canvas id="chart"></canvas>

<div class="history">

<h4>최근 계산</h4>

<ul id="history"></ul>

</div>

</div>

<script>

let rates={}
let previousRates={}
let chart

const currencies=[
"KRW","USD","EUR","JPY","CNY","GBP","AUD","CAD",
"HKD","SGD","THB","VND","INR","PHP","MYR"
]

const from=document.getElementById("from")
const to=document.getElementById("to")

function populateCurrencies(list){

from.innerHTML=""
to.innerHTML=""

list.forEach(c=>{

let o=document.createElement("option")
o.value=c
o.text=c
from.appendChild(o)

let o2=document.createElement("option")
o2.value=c
o2.text=c
to.appendChild(o2)

})

}

populateCurrencies(currencies)

from.value="KRW"
to.value="USD"

async function loadRates(){

try{

let res=await fetch("https://open.er-api.com/v6/latest/KRW")

let data=await res.json()

previousRates=rates

rates=data.rates

localStorage.setItem("rates",JSON.stringify(rates))

}catch{

rates=JSON.parse(localStorage.getItem("rates"))

}

}

function convert(){

let amount=document.getElementById("amount").value
let f=from.value
let t=to.value

if(!amount) return

let krw=amount/rates[f]
let result=krw*rates[t]

result=result.toFixed(2)

document.getElementById("result").innerText=
`${amount} ${f} = ${result} ${t}`

let rate=(rates[t]/rates[f]).toFixed(4)

let change=""

if(previousRates[t]){

let diff=rates[t]-previousRates[t]

if(diff>0) change="📈 상승"
else if(diff<0) change="📉 하락"
else change="➖ 변동 없음"

}

document.getElementById("rateInfo").innerText=
`1 ${f} = ${rate} ${t} ${change}`

drawChart(rate)

saveHistory(`${amount} ${f} → ${result} ${t}`)

}

function swap(){

let temp=from.value
from.value=to.value
to.value=temp

}

function drawChart(rate){

let ctx=document.getElementById("chart")

let data=[]

for(let i=0;i<10;i++){

data.push(rate*(0.95+Math.random()*0.1))

}

if(chart) chart.destroy()

chart=new Chart(ctx,{
type:"line",
data:{
labels:["-9","-8","-7","-6","-5","-4","-3","-2","-1","현재"],
datasets:[{
label:"환율 변화",
data:data
}]
}
})

}

function saveHistory(text){

let history=JSON.parse(localStorage.getItem("history")||"[]")

history.unshift(text)

history=history.slice(0,5)

localStorage.setItem("history",JSON.stringify(history))

renderHistory()

}

function renderHistory(){

let history=JSON.parse(localStorage.getItem("history")||"[]")

let ul=document.getElementById("history")

ul.innerHTML=""

history.forEach(h=>{

let li=document.createElement("li")

li.innerText=h

ul.appendChild(li)

})

}

document.getElementById("search").addEventListener("input",e=>{

let value=e.target.value.toUpperCase()

let filtered=currencies.filter(c=>c.includes(value))

populateCurrencies(filtered)

})

loadRates()

renderHistory()

</script>

</body>
</html>
