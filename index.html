<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>환율 계산기 Pro</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;
background:#f2f4f6;
margin:0;
padding:20px;
}

.app{
max-width:420px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:10px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#2f80ed;
color:white;
border:none;
font-weight:bold;
}

.swap{
background:#eee;
color:#333;
}

.result{
font-size:22px;
font-weight:bold;
text-align:center;
margin-top:15px;
}

.rate{
text-align:center;
color:#666;
font-size:14px;
}

.history{
margin-top:20px;
font-size:14px;
}

.history div{
padding:5px 0;
border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<div class="app">

<h1>환율 계산기</h1>

<input id="amount" type="number" placeholder="금액">

<select id="from"></select>

<button class="swap" onclick="swap()">⇅ 통화 전환</button>

<select id="to"></select>

<input id="fee" type="number" placeholder="수수료 (%)">

<button onclick="convert()">계산</button>

<button onclick="loadRates()">환율 새로고침</button>

<div class="rate" id="rate"></div>

<div class="result" id="result"></div>

<div class="history" id="history"></div>

</div>

<script>

let rates=null
let currencies=[]

async function loadRates(){

try{

let res=await fetch("https://open.er-api.com/v6/latest/KRW")

let data=await res.json()

rates=data.rates

currencies=Object.keys(rates)

localStorage.setItem("rates",JSON.stringify(rates))

let time=new Date().toLocaleString()

localStorage.setItem("time",time)

initCurrencies()

}catch{

rates=JSON.parse(localStorage.getItem("rates"))

currencies=Object.keys(rates)

initCurrencies()

}

}

function initCurrencies(){

let from=document.getElementById("from")
let to=document.getElementById("to")

from.innerHTML=""
to.innerHTML=""

currencies.forEach(c=>{

let o1=document.createElement("option")
o1.value=c
o1.text=c

let o2=document.createElement("option")
o2.value=c
o2.text=c

from.appendChild(o1)
to.appendChild(o2)

})

from.value="KRW"
to.value="USD"

}

function swap(){

let from=document.getElementById("from")
let to=document.getElementById("to")

let tmp=from.value
from.value=to.value
to.value=tmp

convert()

}

function convert(){

if(!rates) return

let amount=Number(document.getElementById("amount").value)
let from=document.getElementById("from").value
let to=document.getElementById("to").value
let fee=Number(document.getElementById("fee").value||0)

if(!amount) return

let krw

if(from==="KRW") krw=amount
else krw=amount/rates[from]

let result

if(to==="KRW") result=krw
else result=krw*rates[to]

result-=result*(fee/100)

result=Math.round(result*100)/100

document.getElementById("result").innerText=result+" "+to

let rateValue

if(from==="KRW") rateValue=rates[to]
else rateValue=rates[to]/rates[from]

document.getElementById("rate").innerText=

"1 "+from+" = "+rateValue.toFixed(4)+" "+to

saveHistory(amount,from,result,to)

}

function saveHistory(a,f,r,t){

let h=JSON.parse(localStorage.getItem("history")||"[]")

h.unshift(a+" "+f+" → "+r+" "+t)

if(h.length>5) h.pop()

localStorage.setItem("history",JSON.stringify(h))

renderHistory()

}

function renderHistory(){

let h=JSON.parse(localStorage.getItem("history")||"[]")

let div=document.getElementById("history")

div.innerHTML=""

h.forEach(i=>{

let d=document.createElement("div")

d.innerText=i

div.appendChild(d)

})

}

renderHistory()

loadRates()

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js")

}

</script>

</body>
</html>
